name: Script checks

on:
  push:
  pull_request:

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile Python
        run: python -m compileall backend scripts/python tests
      - name: Run unit tests
        run: python -m unittest discover -s tests

  powershell:
    name: PowerShell parser checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse collector script
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$pwd/scripts/powershell/Collect-FleetHealth.ps1",
            [ref]$null,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t windows-fleet-health-toolkit .

